version: "3.8"

services:
  dulo-api:
    build: .
    container_name: dulo-tv-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - WORKERS=${WORKERS:-4}
      - THREADS=${THREADS:-2}
      - TIMEOUT=${TIMEOUT:-300}
      - PORT=${PORT:-8000}
      - PROXY_URL=${PROXY_URL:-}
      - FETCH_MODE=${FETCH_MODE:-requests}
      - SSE_TIMEOUT=${SSE_TIMEOUT:-60}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CACHE_TTL=${CACHE_TTL:-300}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
